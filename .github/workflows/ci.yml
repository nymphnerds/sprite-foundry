name: CI

on:
  push:
    paths:
      - 'foundry/**'
      - 'pipeline/**'
      - 'exports/**/manifest.json'
      - 'verify.sh'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'foundry/**'
      - 'pipeline/**'
      - 'exports/**/manifest.json'
      - 'verify.sh'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify foundry module
        run: |
          python -c "from foundry import db; from foundry import cli; print('OK: imports')"

      - name: Verify CLI parser
        run: |
          python -c "from foundry.cli import build_parser; p = build_parser(); print('OK: parser')"

      - name: Validate export manifests
        run: |
          python -c "
          import json, pathlib, sys
          errors = 0
          for m in sorted(pathlib.Path('exports').rglob('manifest.json')):
              try:
                  data = json.loads(m.read_text())
                  assert 'schema_version' in data, f'missing schema_version in {m}'
              except Exception as e:
                  print(f'FAIL: {m} — {e}')
                  errors += 1
          print(f'Checked {len(list(pathlib.Path(\"exports\").rglob(\"manifest.json\")))} manifests')
          sys.exit(1 if errors else 0)
          "

      - name: Check required files
        run: |
          for f in README.md LICENSE CHANGELOG.md SECURITY.md; do
            test -f "$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "All required files present"
