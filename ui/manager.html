<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sprite Foundry</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07100f;
      --surface: #0b1514;
      --surface-2: #101b1d;
      --panel: rgba(8, 17, 18, 0.94);
      --panel-2: rgba(5, 12, 12, 0.98);
      --line: #1b3536;
      --line-strong: #284446;
      --text: #f0faf7;
      --muted: #9bb9b4;
      --dim: #789d98;
      --cyan: #29e6da;
      --green: #97df48;
      --warn: #ffc94a;
      --bad: #ff735f;
      --font-head: Bahnschrift, "Arial Narrow", "Segoe UI", sans-serif;
      --font-mono: "Cascadia Mono", "DM Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --font-body: Inter, "Segoe UI", system-ui, sans-serif;
      font-family: var(--font-body);
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    html, body { height: 100%; }
    * { scrollbar-width: thin; scrollbar-color: rgba(41, 230, 218, 0.78) transparent; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { border-radius: 999px; background: rgba(41, 230, 218, 0.72); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(41, 230, 218, 0.95); }
    ::-webkit-scrollbar-corner { background: transparent; }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background:
        linear-gradient(125deg, #020807 0%, #03100e 44%, #061411 78%, #081816 100%);
      font-family: var(--font-body);
      font-size: 14px;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 4px 7px;
      border: 1px solid var(--line-strong);
      border-radius: 5px;
      background: rgba(15, 26, 28, 0.85);
      color: var(--cyan);
      font-family: var(--font-mono);
      font-size: 9.8px;
      font-weight: 850;
      line-height: 1.1;
      white-space: nowrap;
      cursor: pointer;
    }

    button::before { content: "//"; color: var(--green); }
    button:hover:not(:disabled) {
      border-color: #315659;
      background: #122022;
      color: var(--green);
    }
    button:disabled {
      color: #5e7a75;
      border-color: #1f3637;
      background: rgba(11, 20, 21, 0.72);
      cursor: default;
      opacity: 0.72;
    }
    button:disabled::before { color: #355a56; }
    button.primary {
      border-color: var(--green);
      background: linear-gradient(90deg, var(--green), rgba(41, 230, 218, 0.92));
      color: #06110f;
      font-weight: 950;
    }
    button.primary::before { color: #06110f; }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      outline: none;
      font-size: 12px;
    }

    input,
    select {
      height: 28px;
      padding: 0 7px;
    }

    select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position: calc(100% - 15px) 12px, calc(100% - 10px) 12px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 30px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      padding: 8px;
      line-height: 1.34;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--cyan);
      box-shadow: none;
    }

    label {
      display: block;
      margin: 0 0 3px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 9.6px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.035em;
    }

    .app {
      height: 100vh;
      height: 100dvh;
      min-height: 0;
      display: grid;
      grid-template-columns: clamp(260px, 28vw, 300px) minmax(300px, 1fr);
      min-width: 0;
      background: rgba(2, 8, 7, 0.72);
    }

    .sidebar {
      min-width: 0;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      border-right: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(8, 17, 18, 0.94), rgba(5, 12, 12, 0.98));
      padding: 15px 14px 14px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      gap: 10px;
      padding-bottom: 11px;
    }

    .status-pill {
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 850;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-pill.ok { color: var(--green); }
    .status-pill.warn { color: var(--warn); }

    .section {
      border: 0;
      border-top: 1px solid rgba(33, 71, 74, 0.72);
      border-radius: 0;
      background: transparent;
      padding: 11px 0;
      box-shadow: none;
      min-width: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 7px;
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 10.4px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .section-title span:first-child::before { content: "// "; color: var(--cyan); }
    .section-title span:last-child { color: var(--cyan); }

    .field {
      display: grid;
      gap: 0;
      min-width: 0;
      margin-bottom: 7px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }
    .wide { grid-column: 1 / -1; }

    .command-row {
      display: grid;
      gap: 6px;
      margin-top: 7px;
      align-items: stretch;
    }
    .command-row button {
      width: 100%;
      min-width: 0;
      height: 28px;
      min-height: 28px;
      padding: 2px 6px;
      font-size: 9.5px;
      text-align: center;
    }
    .two { grid-template-columns: 1fr 1fr; }
    .three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .no-top { margin-top: 0; }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
    }

    .check {
      min-height: 27px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 6px;
      border: 1px solid var(--line-strong);
      border-radius: 5px;
      background: rgba(16, 27, 29, 0.82);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0;
      margin: 0;
    }
    .check input {
      width: 13px;
      height: 13px;
      accent-color: var(--cyan);
      margin: 0;
    }

    .stage {
      min-width: 0;
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      background: rgba(7, 16, 15, 0.88);
    }

    .viewer {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 16px 24px 14px;
      position: relative;
      overflow: hidden;
    }

    .image-shell {
      width: 100%;
      height: 100%;
      max-height: none;
      min-height: 0;
      border: 1px solid rgba(40, 68, 70, 0.9);
      border-radius: 8px;
      background:
        url("/ui/nymphs_preview_forest.png") center center / cover no-repeat,
        rgba(4, 12, 11, 0.82);
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    .image-shell img {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      object-fit: contain;
      object-position: center center;
      display: none;
      position: relative;
      z-index: 2;
    }

    .empty {
      display: grid;
      gap: 8px;
      place-items: center;
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .progress {
      padding: 9px 24px 10px;
      display: grid;
      gap: 6px;
      align-content: end;
      background: rgba(11, 23, 24, 0.92);
    }

    .status-line {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      overflow: hidden;
    }
    .status-line span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .model-line {
      min-width: 0;
      overflow: hidden;
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 10.5px;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .model-line span:first-child {
      color: var(--cyan);
      font-weight: 900;
      text-transform: uppercase;
    }

    .progress-line {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr) 86px;
      gap: 10px;
      color: var(--muted);
      align-items: center;
    }

    .progress-stage {
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .bar {
      height: 6px;
      border-radius: 999px;
      background: #223532;
      overflow: hidden;
    }
    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--green), var(--warn));
      transition: width 0.22s ease;
    }

    .strip-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-top: 6px;
      margin-bottom: 6px;
    }

    .strip-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
      font-family: Consolas, monospace;
      font-weight: 900;
      text-transform: uppercase;
    }
    .strip-title span:last-child {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--cyan);
    }

    .strip-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .strip-controls button {
      min-height: 28px;
      padding: 0 9px;
      font-size: 9.8px;
    }

    .strip-browser {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .folder-select {
      height: 28px;
      font-size: 11px;
      font-family: var(--font-mono);
    }

    .folder-menu {
      position: relative;
      width: 34px;
      height: 28px;
      flex: 0 0 34px;
      display: inline-grid;
      place-items: center;
      align-self: center;
      min-width: 34px;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
    }

    .folder-menu summary {
      width: 34px;
      height: 28px;
      box-sizing: border-box;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 0;
      border: 1px solid var(--line-strong);
      border-radius: 5px;
      background: rgba(15, 26, 28, 0.85);
      color: var(--cyan);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      list-style: none;
    }
    .folder-menu summary::-webkit-details-marker { display: none; }
    .folder-menu summary::before { content: ""; }

    .folder-menu-panel {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 6;
      width: 210px;
      display: grid;
      gap: 6px;
      padding: 8px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: rgba(7, 16, 15, 0.98);
      box-shadow: 0 18px 45px rgba(0,0,0,0.36);
    }

    .folder-menu-panel button {
      width: 100%;
      min-height: 28px;
      justify-content: flex-start;
      padding: 0 9px;
      font-size: 9.8px;
    }

    .strip-select-actions {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 6px;
      min-width: 0;
      white-space: nowrap;
    }

    .strip-select-actions button {
      min-height: 28px;
      padding: 0 9px;
      font-size: 9.8px;
    }

    .selection-count {
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }

    .gallery {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 124px;
      gap: 8px;
      overflow-x: auto;
      overscroll-behavior-inline: contain;
      min-height: 0;
    }
    .gallery:empty { display: none; }

    .thumb {
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      background: #08100f;
      padding: 5px;
      display: grid;
      grid-template-rows: 60px auto;
      gap: 5px;
      cursor: pointer;
      min-width: 0;
      position: relative;
    }
    .thumb::before { content: ""; display: none; }
    .thumb.selected { border-color: var(--green); }
    .thumb.checked { border-color: var(--cyan); }
    .thumb.empty-strip { cursor: default; opacity: 0.72; }
    .thumb img {
      width: 100%;
      height: 60px;
      object-fit: contain;
      object-position: center center;
      border-radius: 5px;
      background: #020403;
    }
    .thumb span {
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .thumb.selected span { color: var(--green); }

    .thumb-check {
      position: absolute;
      top: 7px;
      left: 7px;
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(41, 230, 218, 0.72);
      border-radius: 4px;
      background: rgba(2, 8, 7, 0.86);
      z-index: 3;
      cursor: pointer;
    }

    .thumb-check input {
      width: 14px;
      height: 14px;
      accent-color: var(--green);
      margin: 0;
      cursor: pointer;
    }

    pre {
      max-height: 130px;
      min-width: 0;
      margin: 0;
      overflow: auto;
      padding: 9px 10px;
      border: 1px solid rgba(33, 71, 74, 0.72);
      border-radius: 6px;
      background: rgba(2, 8, 8, 0.72);
      color: #d7e7df;
      font-family: var(--font-mono);
      font-size: 10.5px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    details {
      border: 0;
      border-top: 1px solid rgba(33, 71, 74, 0.72);
      border-radius: 0;
      background: transparent;
      padding: 9px 0 0;
      margin-top: 8px;
    }

    summary {
      cursor: pointer;
      color: var(--cyan);
      font-weight: 900;
      font-family: var(--font-mono);
      font-size: 10.4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      list-style: none;
      margin-bottom: 7px;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: "// "; color: var(--green); }

    @media (max-width: 600px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; grid-template-columns: 1fr; }
      .sidebar { height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      .stage { height: 82vh; min-height: min(620px, 100vh); }
      .image-shell { height: 100%; max-height: none; }
      .progress-line { grid-template-columns: 90px minmax(0, 1fr) 46px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand">
        <div id="status-pill" class="status-pill warn">checking</div>
      </div>

      <section class="section">
        <div class="section-title"><span>Runtime</span><span id="runtime-chip">Backend</span></div>
        <div class="command-row three no-top">
          <button id="foundry-status" type="button">Foundry</button>
          <button id="refresh-status" type="button">Refresh</button>
          <button id="check-runtime" type="button">Check</button>
        </div>
        <div class="command-row">
          <button id="open-outputs" type="button">Open Outputs</button>
        </div>
      </section>

      <section class="section">
        <div class="section-title"><span>Prompt</span><span>8-way</span></div>
        <div class="field">
          <label for="prompt-preset">Prompt</label>
          <select id="prompt-preset"></select>
        </div>
        <div class="field">
          <label for="subject-id">Subject ID</label>
          <input id="subject-id" maxlength="80" value="hero_test" autocomplete="off">
        </div>
        <textarea id="subject-prompt" spellcheck="false" maxlength="620">solo, 1character, single character only, one figure, a goblin scout assassin, in a deep predatory crouch with a dark tattered hood, glowing pale yellow eyes, lean compact body wrapped in a ragged cloak, holding twin curved rusty daggers, mottled dark green skin barely visible, fully visible full body</textarea>
        <details>
          <summary>Negative</summary>
          <textarea id="negative-prompt" spellcheck="false" maxlength="520">multiple people, two characters, group, reflection, mirror, turnaround sheet, model sheet, blurry, smooth, photorealistic, 3D render, low quality, deformed, extra limbs, text, watermark, cropped, cut off, partial body</textarea>
        </details>
      </section>

      <section class="section">
        <div class="section-title"><span>Generation</span><span id="model-chip">r32</span></div>
        <div class="grid">
          <div class="field wide">
            <label for="foundry-method">Method</label>
            <select id="foundry-method">
              <option value="nymphscore">NymphsCore / Z-Image</option>
              <option value="stack_a_v2">Stack A v2</option>
              <option value="morph">Morph ControlNet</option>
              <option value="turnaround">Turnaround Sheet</option>
            </select>
          </div>
          <div class="field wide">
            <label for="z-model-choice">Model</label>
            <select id="z-model-choice">
              <option value="auto_r32">Z-Image Nunchaku r32</option>
              <option value="auto_r128">Z-Image Nunchaku r128</option>
              <option value="int4_r256">Z-Image Nunchaku r256</option>
            </select>
          </div>
          <div class="field"><label for="width">Width</label><input id="width" type="number" min="256" max="2048" step="64" value="512"></div>
          <div class="field"><label for="height">Height</label><input id="height" type="number" min="256" max="2048" step="64" value="512"></div>
          <div class="field"><label for="steps">Steps</label><input id="steps" type="number" min="1" max="80" value="8"></div>
          <div class="field"><label for="seed">Seed</label><input id="seed" type="number" value="0"></div>
          <div class="field wide"><label for="lora-choice">LoRA</label><select id="lora-choice"></select></div>
          <div class="field"><label for="lora-trigger">Trigger</label><input id="lora-trigger" maxlength="80" value="pxlstl"></div>
          <div class="field"><label for="lora-scale">Scale</label><input id="lora-scale" type="number" min="0" max="2" step="0.05" value="1"></div>
        </div>
      </section>

      <section class="section">
        <div class="section-title"><span>Sprite Foundry</span><span>8 dirs</span></div>
        <div class="grid">
          <div class="field"><label for="sprite-size">Sprite Size</label><input id="sprite-size" type="number" min="24" max="512" step="8" value="96"></div>
          <div class="field"><label for="palette-colors">Palette</label><input id="palette-colors" type="number" min="0" max="256" step="1" value="0"></div>
        </div>
        <div class="command-row">
          <button id="generate-foundry" class="primary" type="button">Generate Foundry Run</button>
        </div>
      </section>

      <section class="section">
        <div class="section-title"><span>Lifecycle</span><span>foundry</span></div>
        <div class="grid">
          <div class="field wide"><label for="run-id">Run ID</label><input id="run-id" maxlength="120" autocomplete="off"></div>
          <div class="field"><label for="review-direction">Direction</label><select id="review-direction">
            <option value="front">front</option>
            <option value="front_left">front_left</option>
            <option value="left">left</option>
            <option value="back_left">back_left</option>
            <option value="back">back</option>
            <option value="back_right">back_right</option>
            <option value="right">right</option>
            <option value="front_right">front_right</option>
          </select></div>
          <div class="field"><label for="attempt-id">Attempt ID</label><input id="attempt-id" maxlength="120" autocomplete="off"></div>
          <div class="field wide"><label for="reject-code">Reject Code</label><input id="reject-code" maxlength="80" value="needs_regen" autocomplete="off"></div>
        </div>
        <div class="command-row three">
          <button id="foundry-check" type="button">Check</button>
          <button id="foundry-review" type="button">Review</button>
          <button id="foundry-winner" type="button">Winner</button>
        </div>
        <div class="command-row two">
          <button id="foundry-accept" type="button">Accept Direction</button>
          <button id="foundry-reject" type="button">Reject Direction</button>
        </div>
        <div class="command-row three">
          <button id="foundry-batch-accept" type="button">Batch Accept</button>
          <button id="foundry-produce" type="button">Produce</button>
          <button id="foundry-export" type="button">Export</button>
        </div>
        <div class="command-row three">
          <button id="foundry-lineage" type="button">Lineage</button>
          <button id="foundry-drift" type="button">Drift</button>
          <button id="foundry-metrics" type="button">Metrics</button>
        </div>

      const selectedOption = Array.from(select.options).find((option) => !option.disabled && option.value === selectedId)
        || Array.from(select.options).find((option) => option.dataset.path === values.selected_lora_path)
        || Array.from(select.options).find((option) => !option.disabled)
        || select.options[0];
      const runtimeOption = selectedOption;
      if (runtimeOption) {
        select.value = runtimeOption.value;
        state.selectedLoraPath = runtimeOption.dataset.path || state.selectedLoraPath;
      }
    }

    function renderStatus(text) {
      const values = parseKeyValues(text);
      state.statusValues = values;
      const loras = list(values.downloaded_loras);
      const spriteLoraTotal = loraAvailableIds(values).length;
      const spriteLoraDownloaded = list(values.weight_profiles_downloaded).filter((id) => loraMetadata[canonicalLoraId(id)]).length || loras.filter((id) => loraMetadata[canonicalLoraId(id)]).length;
      const zReady = yes(values.zimage_models_ready);
      const zRunning = yes(values.zimage_running);
      const controlReady = yes(values.controlnet_ready);
      if (!state.zModelTouched) $("z-model-choice").value = zModelChoiceFromStatus(values);

      $("status-pill").textContent = statusLabel();
      $("status-pill").className = statusClass();
      $("runtime-chip").textContent = zRunning ? "ready" : "start backend";
      $("model-chip").textContent = zModelChipText();
      $("runtime-text").textContent = values.zimage_url ? `Backend ${values.zimage_url} / ${zRunning ? "running" : "not running"} / ${zReady ? "models ready" : "fetch models"}` : "Backend";
      $("selected-model-text").textContent = values.selected_lora_path ? basename(values.selected_lora_path) : (loras.join(", ") || "none");
      $("progress-detail").textContent = `Backend ${zRunning && zReady ? "ready" : "not ready"} | ControlNet ${controlReady ? "ready" : "missing"} | LoRA ${spriteLoraDownloaded}/${spriteLoraTotal}`;
      populateLoraChoices(values);
      if (values.selected_lora_trigger) $("lora-trigger").value = values.selected_lora_trigger;
      if (values.selected_lora_scale) $("lora-scale").value = values.selected_lora_scale;
      const selectedOption = $("lora-choice").selectedOptions[0];
      const trigger = loraTriggerFor($("lora-choice").value, selectedOption?.dataset.path || "");
      if (trigger) $("lora-trigger").value = trigger;
      setProgress("Idle", $("progress-detail").textContent, 0);
      updateFoundryControls();
    }

    function pathToFileUrl(path) {
      if (!path) return "";
      if (/^https?:\/\//i.test(path)) return path;
      if (/^\/outputs\//i.test(path)) return path;
      if (/^file:\/\//i.test(path)) {
        try {
          path = decodeURIComponent(new URL(path).pathname);
        } catch {
          path = path.replace(/^file:\/\//i, "");
        }
      }
      const normalized = String(path).replace(/\\/g, "/");
      const roots = [
        { marker: "/NymphsData/outputs/sprite-foundry/", source: "outputs" },
        { marker: "/Sprite-Foundry/bakeoff/", source: "bakeoff" },
        { marker: "/Sprite-Foundry/exports/", source: "exports" },
        { marker: "/NymphsModules/sprite-foundry/bakeoff/", source: "bakeoff" },
        { marker: "/NymphsModules/sprite-foundry/exports/", source: "exports" }
      ];
      for (const root of roots) {
        const index = normalized.indexOf(root.marker);
        if (index >= 0) {
          const relative = normalized.slice(index + root.marker.length).split("/").map(encodeURIComponent).join("/");
          return `/outputs/${root.source}/${relative}`;
        }
      }
      return normalized.startsWith("/") ? "" : normalized;
    }

    function previewUrl(output) {
      if (!output?.url) return "";
      if (String(output.url).startsWith("blob:")) return output.url;
      const stamp = output.created ? String(Math.round(Number(output.created) * 1000)) : "";
      if (!stamp) return output.url;
      return `${output.url}${output.url.includes("?") ? "&" : "?"}v=${encodeURIComponent(stamp)}`;
    }

    function addOutput(path, label, previewUrl = "") {
      if (!path || path === "None") return;
      if (!/\.(png|jpg|jpeg|webp)$/i.test(path)) return;
      const url = previewUrl || pathToFileUrl(path);
      const existing = state.outputs.find((item) => item.path === path || (previewUrl && item.url === previewUrl));
      if (existing) {
        existing.url = url || existing.url;
        existing.label = label || existing.label;
        renderGallery();
        if (state.visibleOutputs[0]) showOutput(0);
        return;
      }
      state.outputs.unshift({
        path,
        relative_path: path,
        label: label || basename(path),
        url,
        managed: true,
        created: Date.now() / 1000,
        folder: "Current batch"
      });
      state.viewerSource = "batch";
      state.outputView = "recent";
      renderGallery();
      showOutput(0);
    }

    function parseOutputPaths(text) {
      for (const line of String(text || "").split(/\r?\n/)) {
        const kv = line.match(/^(sprite_contact_sheet|output_[A-Za-z0-9_]+)=([^\r\n]+)$/);
        if (kv) addOutput(kv[2].trim(), kv[1].replace(/^output_/, ""));
        const named = line.match(/^\s*(Raw inspection|Pixel contact):\s+(.+\.(?:png|jpg|jpeg|webp))\s*$/i);
        if (named) addOutput(named[2].trim(), named[1].toLowerCase());
      }
      const jsonPaths = [...String(text || "").matchAll(/"output_path"\s*:\s*"([^"]+)"/g)]
        .map((match) => match[1].replace(/\\\//g, "/"));
      const jsonUrls = [...String(text || "").matchAll(/"url"\s*:\s*"([^"]+)"/g)]
        .map((match) => match[1].replace(/\\\//g, "/"));
      for (const [index, path] of jsonPaths.entries()) {
        addOutput(path, "foundry", jsonUrls[index] || "");
      }
      for (const rawUrl of jsonUrls.slice(jsonPaths.length)) {
        addOutput(rawUrl, "foundry");
      }
    }

    function parseProgress(text) {
      const line = String(text || "").trim();
      if (!line) return;
      if (line.includes("MODEL FETCH STATUS") || line.includes("LORA FETCH STATUS")) {
        setProgress("Fetch", line.replace(/\s+/g, " "), 45);
      } else if (line.startsWith("generate=")) {
        setProgress("Generate", line, 65);
      } else if (line.startsWith("sprite_contact_sheet=")) {
        setProgress("Done", "Contact sheet ready.", 100);
      } else if (line.startsWith("batch_id=")) {
        setProgress("Batch", line, 20);
      }
    }

    function outputCreatedMs(output) {
      const raw = Number(output?.created || output?.mtime || 0);
      if (!Number.isFinite(raw) || raw <= 0) return 0;
      return raw > 100000000000 ? raw : raw * 1000;
    }

    function outputDateKey(output) {
      const created = outputCreatedMs(output);
      if (!created) return "Unknown Date";
      const date = new Date(created);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function outputFolder(output) {
      if (output?.folder) return output.folder;
      const text = String(output?.relative_path || output?.path || "");
      const parts = text.split(/[\\/]/).filter(Boolean);
      if (parts.length > 1) return parts.at(-2);
      return "";
    }

    function folderLabel(folder) {
      return String(folder || "").split(/[\\/]/).filter(Boolean).pop() || folder || "Folder";
    }

    function sortedViewerOutputs() {
      const outputs = [...state.outputs];
      if (state.viewerSource === "batch") return outputs;
      outputs.sort((a, b) => outputCreatedMs(b) - outputCreatedMs(a));
      return outputs;
    }

    function syncOutputViewOptions(outputs) {
      const select = $("output-folder");
      const dates = [...new Set(outputs.map(outputDateKey))].sort().reverse();
      const folders = [...new Set(outputs.map(outputFolder).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      const validViews = new Set([
        "recent",
        ...dates.map((date) => `date:${date}`),
        ...folders.map((folder) => `folder:${folder}`)
      ]);
      if (!validViews.has(state.outputView)) state.outputView = "recent";
      select.innerHTML = "";
      const recentOption = document.createElement("option");
      recentOption.value = "recent";
      recentOption.textContent = `${state.viewerSource === "batch" ? "Current batch" : "Recent"} (${outputs.length})`;
      select.appendChild(recentOption);
      for (const date of dates) {
        const count = outputs.filter((output) => outputDateKey(output) === date).length;
        const option = document.createElement("option");
        option.value = `date:${date}`;
        option.textContent = `${date} (${count})`;
        select.appendChild(option);
      }
      for (const folder of folders) {
        const count = outputs.filter((output) => outputFolder(output) === folder).length;
        const option = document.createElement("option");
        option.value = `folder:${folder}`;
        option.textContent = `Folder: ${folderLabel(folder)} (${count})`;
        select.appendChild(option);
      }
      select.value = state.outputView;
      select.disabled = outputs.length === 0;
    }

    function stripOutputs() {
      const outputs = sortedViewerOutputs();
      syncOutputViewOptions(outputs);
      if (state.outputView === "recent") return outputs;
      if (state.outputView.startsWith("date:")) {
        const date = state.outputView.slice(5);
        return outputs.filter((output) => outputDateKey(output) === date);
      }
      if (state.outputView.startsWith("folder:")) {
        const folder = state.outputView.slice(7);
        return outputs.filter((output) => outputFolder(output) === folder);
      }
      return outputs;
    }

    function currentOutputViewLabel() {
      if (state.outputView === "recent") {
        if (state.viewerSource === "batch") return "Current batch";
        if (state.viewerSource === "manual") return state.manualFolderName || "Chosen Folder";
        return "Recent";
      }
      if (state.outputView.startsWith("date:")) return state.outputView.slice(5);
      if (state.outputView.startsWith("folder:")) return folderLabel(state.outputView.slice(7));
      return "Outputs";
    }

    function renderGallery() {
      const gallery = $("gallery");
      gallery.innerHTML = "";
      state.visibleOutputs = stripOutputs();
      const label = currentOutputViewLabel();
      $("strip-label").textContent = `${label} (${state.visibleOutputs.length})`;
      updateSelectionCount();
      if (!state.visibleOutputs.length) {
        const node = document.createElement("div");
        node.className = "thumb empty-strip";
        node.innerHTML = `<span>No images yet</span>`;
        gallery.appendChild(node);
        updateStripControls();
        return;
      }
      for (const [index, item] of state.visibleOutputs.entries()) {
        const key = outputKey(item);
        const node = document.createElement("div");
        node.className = `thumb ${index === state.selectedIndex ? "selected" : ""} ${state.selectedOutputPaths.has(key) ? "checked" : ""}`;
        node.dataset.key = key;
        node.innerHTML = `
          <label class="thumb-check" title="Select output"><input type="checkbox" ${state.selectedOutputPaths.has(key) ? "checked" : ""}></label>
          <img src="${escapeHtml(previewUrl(item))}" alt="">
          <span>${escapeHtml(item.label)}</span>
        `;
        const checkbox = node.querySelector("input");
        checkbox.addEventListener("change", (event) => {
          event.stopPropagation();
          toggleOutputSelection(item, checkbox.checked);
        });
        node.addEventListener("click", () => showOutput(index));
        gallery.appendChild(node);
      }
      updateStripControls();
    }

    function normalizeManagedOutput(item, index) {
      const rawPath = item.path || item.output_path || item.relative_path || item.url || "";
      let url = item.url || pathToFileUrl(rawPath);
      if (url && !/^https?:\/\//i.test(url) && !url.startsWith("/")) {
        url = pathToFileUrl(url);
      }
      return {
        path: rawPath || url || `output:${index}`,
        relative_path: item.relative_path || rawPath,
        label: item.item_label || item.name || basename(rawPath || url) || `image-${index + 1}`,
        url,
        managed: true,
        source: item.source || "",
        created: item.created || item.mtime || 0,
        folder: item.folder || "",
      };
    }

    async function refreshRecentOutputs(selectFirst = false) {
      if (state.viewerSource === "manual" || state.viewerSource === "batch") return;
      try {
        const response = await fetch("/api/outputs?limit=80", { cache: "no-store" });
        if (!response.ok) throw new Error("Could not refresh outputs.");
        const body = await response.json();
        state.outputs = (body.outputs || []).map(normalizeManagedOutput);
        state.viewerSource = "outputs";
        state.selectedOutputPaths.clear();
        state.manualFolderName = "";
        renderGallery();
        if (selectFirst && state.visibleOutputs[0]) showOutput(0);
      } catch {
        renderGallery();
      }
    }

    function showOutput(index) {
      const visible = stripOutputs();
      const item = visible[index];
      if (!item) return;
      state.selectedIndex = index;
      const image = $("result-image");
      image.src = previewUrl(item);
      image.style.display = "block";
      $("empty").hidden = true;
      $("output-label").textContent = item.label || basename(item.path);
      renderGallery();
    }

    function outputKey(item) {
      return item?.path || item?.url || "";
    }

    function localOutputPath(item) {
      const path = String(item?.path || "").trim();
      if (!path || /^(https?:|manual:)/i.test(path)) return "";
      return path.startsWith("/") ? path : "";
    }

    function updateSelectionCount() {
      const visibleKeys = new Set((state.visibleOutputs || []).map(outputKey));
      const count = [...state.selectedOutputPaths].filter((key) => visibleKeys.has(key)).length;
      $("selection-count").textContent = `${count} selected`;
    }

    function visibleSelectedOutputs() {
      return (state.visibleOutputs || []).filter((item) => state.selectedOutputPaths.has(outputKey(item)));
    }

    function visibleSelectedSourcePaths() {
      return visibleSelectedOutputs().map(localOutputPath).filter(Boolean);
    }

    function currentManagedFolder() {
      if (state.viewerSource === "manual" || !state.outputView.startsWith("folder:")) return "";
      const folder = state.outputView.slice(7);
      if (!folder || folder.includes("/") || folder.includes("\\")) return "";
      return state.visibleOutputs.some((item) => item.managed !== false && outputFolder(item) === folder) ? folder : "";
    }

    function updateStripControls() {
      const visible = state.visibleOutputs || [];
      const selected = visibleSelectedOutputs();
      const managedSelected = selected.filter((item) => item.managed !== false);
      $("strip-prev").disabled = visible.length < 2 || state.busy;
      $("strip-next").disabled = visible.length < 2 || state.busy;
      $("select-visible").disabled = state.selectedIndex < 0 || state.busy;
      $("select-all-visible").disabled = visible.length === 0 || state.busy;
      $("clear-selection").disabled = state.selectedOutputPaths.size === 0 || state.busy;
      $("move-selected").disabled = managedSelected.length === 0 || state.busy;
      $("delete-selected").disabled = managedSelected.length === 0 || state.busy;
      $("delete-folder").disabled = !currentManagedFolder() || state.busy;
      updateSelectionCount();
    }

    function toggleOutputSelection(item, checked) {
      const key = outputKey(item);
      if (!key) return;
      if (checked) state.selectedOutputPaths.add(key);
      else state.selectedOutputPaths.delete(key);
      renderGallery();
    }

    function selectVisibleOutput() {
      const item = (state.visibleOutputs || [])[state.selectedIndex];
      if (!item) return;
      state.selectedOutputPaths.add(outputKey(item));
      renderGallery();
    }

    function selectAllVisibleOutputs() {
      for (const item of state.visibleOutputs || []) state.selectedOutputPaths.add(outputKey(item));
      renderGallery();
    }

    function clearOutputSelection() {
      for (const item of state.visibleOutputs || []) state.selectedOutputPaths.delete(outputKey(item));
      renderGallery();
    }

    function managedOutputRef(item) {
      return {
        source: item.source || "",
        relative_path: item.relative_path || item.path || "",
        path: item.path || "",
      };
    }

    function applyOutputResponse(body, preferredView = "") {
      state.outputs = (body.outputs || []).map(normalizeManagedOutput);
      state.viewerSource = "outputs";
      if (preferredView) state.outputView = preferredView;
      state.manualFolderName = "";
      renderGallery();
      if (state.visibleOutputs[0]) showOutput(0);
      else {
        state.selectedIndex = -1;
        $("result-image").removeAttribute("src");
        $("result-image").style.display = "none";
        $("empty").hidden = false;
        $("output-label").textContent = "No output";
      }
    }

    async function moveSelectedOutputs() {
      const managed = visibleSelectedOutputs().filter((item) => item.managed !== false);
      if (!managed.length) return;
      const folder = window.prompt("Move selected images to folder", "");
      if (folder === null) return;
      $("folder-menu").open = false;
      const response = await fetch("/api/outputs/move", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ folder, items: managed.map(managedOutputRef) }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        append(`ERROR: ${body.detail || "Could not move selected outputs."}`);
        return;
      }
      for (const item of managed) state.selectedOutputPaths.delete(outputKey(item));
      applyOutputResponse(body, body.folder ? `folder:${body.folder}` : "recent");
    }

    async function deleteCurrentFolder() {
      const folder = currentManagedFolder();
      if (!folder) return;
      const count = state.visibleOutputs.filter((item) => item.managed !== false && outputFolder(item) === folder).length;
      const noun = count === 1 ? "image" : "images";
      if (!window.confirm(`Delete folder "${folder}" and ${count} ${noun} inside it?`)) return;
      $("folder-menu").open = false;
      const response = await fetch("/api/outputs/folder/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ folder }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        append(`ERROR: ${body.detail || "Could not delete folder."}`);
        return;
      }
      for (const item of state.visibleOutputs) state.selectedOutputPaths.delete(outputKey(item));
      applyOutputResponse(body, "recent");
    }

    async function deleteSelectedOutputs() {
      const managed = visibleSelectedOutputs().filter((item) => item.managed !== false);
      if (!managed.length) return;
      const noun = managed.length === 1 ? "image" : "images";
      if (!window.confirm(`Delete ${managed.length} selected ${noun} and matching metadata from Nymphs outputs?`)) return;
      const response = await fetch("/api/outputs/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ items: managed.map(managedOutputRef) }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        append(`ERROR: ${body.detail || "Could not delete selected outputs."}`);
        return;
      }
      for (const item of managed) state.selectedOutputPaths.delete(outputKey(item));
      applyOutputResponse(body);
    }

    function clearLocalObjectUrls() {
      for (const url of state.localObjectUrls) URL.revokeObjectURL(url);
      state.localObjectUrls = [];
    }

    function chooseFolderImages(files) {
      const images = Array.from(files || []).filter((file) => file.type.startsWith("image/"));
      clearLocalObjectUrls();
      state.outputs = images.map((file, index) => {
        const url = URL.createObjectURL(file);
        state.localObjectUrls.push(url);
        const relativePath = file.webkitRelativePath || file.name || url;
        return {
          path: `manual:${index}:${relativePath}`,
          relative_path: `manual:${index}:${relativePath}`,
          label: file.name || `image-${index + 1}`,
          url,
          folder: images[0]?.webkitRelativePath?.split("/")[0] || "Chosen folder",
          created: (file.lastModified || Date.now()) / 1000,
          managed: false,
        };
      });
      state.selectedOutputPaths.clear();
      state.manualFolderName = images[0]?.webkitRelativePath?.split("/")[0] || "Chosen folder";
      state.viewerSource = "manual";
      state.outputView = `folder:${state.manualFolderName}`;
      state.selectedIndex = -1;
      renderGallery();
      if (state.visibleOutputs[0]) showOutput(0);
      $("folder-picker").value = "";
    }

    function stepOutput(offset) {
      const visible = state.visibleOutputs || stripOutputs();
      if (!visible.length) return;
      const current = state.selectedIndex < 0 ? 0 : state.selectedIndex;
      showOutput((current + offset + visible.length) % visible.length);
    }

    function moduleAction(action, args = {}, options = {}) {
      const run = () => {
        if (!window.chrome || !window.chrome.webview) {
          append("ERROR: NymphsCore Manager bridge is unavailable.");
          $("status-pill").textContent = "bridge";
          $("status-pill").className = "status-pill warn";
          return Promise.reject(new Error("Manager bridge unavailable"));
        }

        const requestId = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        if (!options.quiet) append(`$ ${action}`);
        if (options.busy !== false) setBusy(true, action);
        return new Promise((resolve, reject) => {
          pending.set(requestId, { resolve, reject, options });
          window.chrome.webview.postMessage({ type: "module_action", requestId, action, args });
        });
      };
      const queued = actionQueue.catch(() => {}).then(run);
      actionQueue = queued.catch(() => {});
      return queued;
    }

    function onMessage(event) {
      const message = typeof event.data === "string" ? JSON.parse(event.data) : event.data;
      if (!message || !message.type) return;
      if (message.type === "module_action_progress") {
        append(message.line || "");
        return;
      }
      if (message.type !== "module_action_result") return;

      const item = pending.get(message.requestId);
      if (!item) return;
      pending.delete(message.requestId);
      if (item.options.busy !== false) setBusy(false);
      if (message.ok) {
        const text = message.output || "";
        if (!item.options.quiet && text.trim()) append(text.trim());
        item.resolve(text);
      } else {
        const error = message.error || "Action failed.";
        append(`ERROR: ${error}`);
        setProgress("Error", error, 0);
        $("status-pill").textContent = "error";
        $("status-pill").className = "status-pill warn";
        item.reject(new Error(error));
      }
    }

    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.addEventListener("message", onMessage);
    }

    function value(id) {
      return $(id).value.trim();
    }

    function compactArgs(args) {
      return Object.fromEntries(Object.entries(args).filter(([, val]) => String(val).trim() !== ""));
    }

    function base64Url(value) {
      const bytes = new TextEncoder().encode(String(value || ""));
      let binary = "";
      for (const byte of bytes) binary += String.fromCharCode(byte);
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function addEncodedArg(args, name, value) {
      const encoded = base64Url(value);
      if (!encoded) return;
      const chunkSize = 240;
      for (let index = 0; index < encoded.length; index += chunkSize) {
        args[`${name}-b64-${Math.floor(index / chunkSize)}`] = encoded.slice(index, index + chunkSize);
      }
    }

    function currentPreset() {
      return promptPresets[$("prompt-preset").value] || {};
    }

    function buildModuleArgs() {
      const zSelection = zImageSelection();
      const preset = currentPreset();
      const args = {
        "generation-path": value("foundry-method") || "nymphscore",
        config: preset.sourceConfig || "pipeline/chars/goblin_scout.json",
        "subject-id": value("subject-id"),
        "lora-scale": value("lora-scale"),
        seed: value("seed"),
        steps: value("steps"),
        width: value("width"),
        height: value("height"),
        "sprite-size": value("sprite-size"),
        "palette-colors": value("palette-colors"),
        "nunchaku-rank": String(zSelection.nunchaku_rank),
        "nunchaku-precision": zSelection.nunchaku_precision
      };
      addEncodedArg(args, "subject-prompt", value("subject-prompt"));
      addEncodedArg(args, "negative-prompt", value("negative-prompt"));
      addEncodedArg(args, "lora-path", state.selectedLoraPath);
      addEncodedArg(args, "lora-trigger", value("lora-trigger"));
      return compactArgs(args);
    }

    function parseRunId(text) {
      const match = String(text || "").match(/^(?:Run|run_id):\s*([A-Za-z0-9_.:-]+)/m);
      if (match) {
        $("run-id").value = match[1];
        updateFoundryControls();
      }
    }

    function hasRunId() {
      return Boolean(value("run-id"));
    }

    function generationReadyReason() {
      const values = state.statusValues || {};
      if (!yes(values.controlnet_ready)) return "Fetch ControlNet from the Sprite Foundry details page first.";
      if (!yes(values.zimage_models_ready)) return "Fetch the Z-Image base/Nunchaku model files first.";
      if (!yes(values.zimage_running)) return "Start or open Nymphs Image / Z-Image before generating.";
      if (!$("lora-choice").value || !state.selectedLoraPath) return "Download or choose a Z-Image pixel-art LoRA first.";
      return "";
    }

    function updateFoundryControls() {
      const runReady = hasRunId();
      const generationBlocker = generationReadyReason();
      $("generate-foundry").disabled = state.busy || Boolean(generationBlocker);
      $("generate-foundry").title = generationBlocker || "Generate a Sprite Foundry run.";
      const runButtons = [
        "foundry-check",
        "foundry-review",
        "foundry-winner",
        "foundry-accept",
        "foundry-reject",
        "foundry-batch-accept",
        "foundry-produce",
        "foundry-export",
        "foundry-lineage",
        "foundry-drift",
      ];
      for (const id of runButtons) {
        const button = $(id);
        button.disabled = state.busy || !runReady;
        button.title = runReady ? "Run this Foundry action on the current run." : "Generate a run first.";
      }
      $("foundry-metrics").disabled = state.busy;
      $("foundry-metrics").title = "Show Foundry metrics.";
    }

    function foundryCommandArgs(command) {
      return compactArgs({
        command,
        "run-id": value("run-id"),
        direction: value("review-direction"),
        "attempt-id": value("attempt-id"),
        code: value("reject-code"),
      });
    }

    async function runFoundryCommand(command, stage = "Foundry") {
      if (state.busy) return;
      const runScoped = !["metrics"].includes(command);
      if (runScoped && !hasRunId()) {
        setProgress(stage, "Generate a run first.", 0);
        return;
      }
      setProgress(stage, command, 20);
      setBusy(true, stage);
      try {
        const text = await moduleAction("foundry_cli", foundryCommandArgs(command), { busy: false });
        parseRunId(text);
        await refreshRecentOutputs(true);
        setProgress("Done", command, 100);
      } catch (error) {
        append(`ERROR: ${error.message || error}`);
        setProgress("Error", error.message || "Foundry command failed.", 0);
        $("status-pill").textContent = "error";
        $("status-pill").className = "status-pill warn";
      } finally {
        setBusy(false);
      }
    }

    function zModelChoiceFromStatus(values) {
      const profile = String(values.zimage_weight_profile_selected || "").replace(/^zimage_/, "");
      const match = profile.match(/^(auto|int4|fp4)_r(32|128|256)$/);
      const rank = parseInt(values.zimage_nunchaku_rank || (match ? match[2] : "32"), 10);
      if (rank === 256) return "int4_r256";
      if (rank === 128) return "auto_r128";
      return "auto_r32";
    }

    function zModelChipText() {
      const [, rawRank] = String($("z-model-choice")?.value || "auto_r32").split("_r");
      return `r${rawRank || "32"}`;
    }

    function zImageSelection() {
      const choice = $("z-model-choice")?.value || zModelChoiceFromStatus(state.statusValues || {});
      const [precision, rawRank] = String(choice || "auto_r32").split("_r");
      const rank = parseInt(rawRank || "32", 10);
      return {
        model_id: "Tongyi-MAI/Z-Image-Turbo",
        nunchaku_rank: [32, 128, 256].includes(rank) ? rank : 32,
        nunchaku_precision: precision || "auto",
        label: $("z-model-choice")?.selectedOptions?.[0]?.textContent || "Z-Image"
      };
    }

    function populatePromptPresets() {
      const select = $("prompt-preset");
      select.innerHTML = "";
      for (const [id, preset] of Object.entries(promptPresets)) {
        const option = document.createElement("option");
        option.value = id;
        option.textContent = preset.label;
        option.disabled = !preset.generationReady;
        if (preset.lane) option.dataset.lane = preset.lane;
        if (!preset.generationReady) option.title = "Original roster entry; prompt config is not available yet.";
        select.appendChild(option);
      }
      select.value = "goblin_scout";
    }

    function applyPromptPreset(id) {
      const preset = promptPresets[id];
      if (!preset || !preset.generationReady) return;
      if (preset.subjectId) $("subject-id").value = preset.subjectId;
      if (preset.seed) $("seed").value = preset.seed;
      $("subject-prompt").value = preset.subject;
      $("negative-prompt").value = preset.negative;
    }

    function markPromptCustom() {
      state.promptEdited = true;
    }

    async function refreshStatus() {
      try {
        const text = await moduleAction("status", {}, { quiet: true, busy: false });
        renderStatus(text);
        await refreshRecentOutputs(true);
      } catch {
        setProgress("Status", "Could not read module status.", 0);
      }
    }

    $("refresh-status").addEventListener("click", refreshStatus);
    $("foundry-status").addEventListener("click", () => moduleAction("foundry_status").catch(() => {}));
    $("check-runtime").addEventListener("click", () => moduleAction("status").catch(() => {}));
    $("open-outputs").addEventListener("click", () => moduleAction("open_outputs").catch(() => {}));
    $("strip-prev").addEventListener("click", () => stepOutput(-1));
    $("strip-next").addEventListener("click", () => stepOutput(1));
    $("choose-folder").addEventListener("click", () => {
      $("folder-menu").open = false;
      $("folder-picker").click();
    });
    $("folder-picker").addEventListener("change", (event) => chooseFolderImages(event.target.files));
    $("output-folder").addEventListener("change", () => {
      state.outputView = $("output-folder").value || "recent";
      state.selectedIndex = -1;
      renderGallery();
      if (state.visibleOutputs[0]) showOutput(0);
    });
    $("select-visible").addEventListener("click", selectVisibleOutput);
    $("select-all-visible").addEventListener("click", selectAllVisibleOutputs);
    $("clear-selection").addEventListener("click", clearOutputSelection);
    $("move-selected").addEventListener("click", moveSelectedOutputs);
    $("delete-folder").addEventListener("click", deleteCurrentFolder);
    $("delete-selected").addEventListener("click", deleteSelectedOutputs);
    $("lora-choice").addEventListener("change", () => {
      const option = $("lora-choice").selectedOptions[0];
      state.selectedLoraPath = option?.dataset.path || "";
      const trigger = loraTriggerFor($("lora-choice").value, state.selectedLoraPath);
      if (trigger) $("lora-trigger").value = trigger;
      updateFoundryControls();
    });
    $("z-model-choice").addEventListener("change", () => {
      state.zModelTouched = true;
      $("model-chip").textContent = zModelChipText();
    });
    function runGeneration() {
      if (state.busy) return;
      state.outputs = [];
      state.selectedIndex = -1;
      state.manualFolderName = "";
      state.viewerSource = "batch";
      state.selectedOutputPaths.clear();
      renderGallery();
      $("result-image").style.display = "none";
      $("empty").hidden = false;
      setProgress("Generate", "Running Sprite Foundry.", 10);
      setBusy(true, "Foundry");
      (async () => {
        const text = await moduleAction("foundry_generate", buildModuleArgs(), { busy: false });
        parseOutputPaths(text);
        parseRunId(text);
        state.viewerSource = "outputs";
        state.outputView = "recent";
        await refreshRecentOutputs(true);
        setProgress("Done", state.outputs.length ? "Foundry run ready." : "Finished.", 100);
      })().catch((error) => {
        append(`ERROR: ${error.message || error}`);
        setProgress("Error", error.message || "Generation failed.", 0);
        $("status-pill").textContent = "error";
        $("status-pill").className = "status-pill warn";
      }).finally(() => setBusy(false));
    }

    $("prompt-preset").addEventListener("change", () => applyPromptPreset($("prompt-preset").value));
    $("subject-prompt").addEventListener("input", markPromptCustom);
    $("negative-prompt").addEventListener("input", markPromptCustom);
    $("run-id").addEventListener("input", updateFoundryControls);
    $("generate-foundry").addEventListener("click", runGeneration);
    $("foundry-check").addEventListener("click", () => runFoundryCommand("check", "Gates"));
    $("foundry-review").addEventListener("click", () => runFoundryCommand("review-show", "Review"));
    $("foundry-winner").addEventListener("click", () => runFoundryCommand("winner", "Winner"));
    $("foundry-accept").addEventListener("click", () => runFoundryCommand("review-accept", "Accept"));
    $("foundry-reject").addEventListener("click", () => runFoundryCommand("review-reject", "Reject"));
    $("foundry-batch-accept").addEventListener("click", () => runFoundryCommand("batch-accept", "Accept"));
    $("foundry-produce").addEventListener("click", () => runFoundryCommand("produce", "Produce"));
    $("foundry-export").addEventListener("click", () => runFoundryCommand("export", "Export"));
    $("foundry-lineage").addEventListener("click", () => runFoundryCommand("lineage", "Lineage"));
    $("foundry-drift").addEventListener("click", () => runFoundryCommand("drift", "Drift"));
    $("foundry-metrics").addEventListener("click", () => runFoundryCommand("metrics", "Metrics"));

    populatePromptPresets();
    applyPromptPreset("goblin_scout");
    renderGallery();
    refreshStatus();
    refreshRecentOutputs(true);
  </script>
</body>
</html>
